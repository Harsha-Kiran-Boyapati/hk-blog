<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #eee;
    }

    #app {
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100%;
    }

    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 16px 24px 0;
      width: 100%;
    }

    #panel-toggle {
      position: fixed;
      top: 8px;
      left: 10px;
      z-index: 20;
      width: 38px;
      height: 38px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 1.5rem;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #panel-toggle:hover { color: #fff; }

    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: #0e0e0e;
      border-right: 1px solid #1c1c1c;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s ease;
    }
    #sidebar.collapsed {
      width: 0;
      border-right: none;
    }

    .rec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 12px 14px 54px;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
    }
    .rec-record-btn {
      flex: 1;
      background: #f44336;
      border: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    .rec-record-btn:hover { background: #e53935; }
    .rec-record-btn.on { background: #b71c1c; }
    .rec-status {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .sidebar-head {
      padding: 14px 12px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #666;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid #1c1c1c;
      flex-shrink: 0;
    }
    #rec-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #rec-list::-webkit-scrollbar { width: 4px; }
    #rec-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .rec-item {
      padding: 10px 12px;
      border-bottom: 1px solid #141414;
      cursor: pointer;
    }
    .rec-item:hover { background: #141414; }
    .rec-item.active { background: #0d1a2e; }

    .rec-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .rec-name {
      flex: 1;
      min-width: 0;
      font-size: 0.78rem;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rec-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .rec-duration { font-size: 0.72rem; color: #555; }
    .rec-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .rec-rename, .rec-delete, .rec-download {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 0.8rem; padding: 2px 4px; border-radius: 3px;
    }
    .rec-rename:hover { color: #4a9eff; background: rgba(74,158,255,0.08); }
    .rec-download:hover { color: #4caf50; background: rgba(76,175,80,0.08); }
    .rec-delete:hover { color: #f44336; background: rgba(244,67,54,0.08); }
    .rec-name-input {
      flex: 1;
      min-width: 0;
      background: #1a1a1a;
      border: 1px solid #4a9eff;
      color: #eee;
      font-family: inherit;
      font-size: 0.78rem;
      padding: 3px 5px;
      border-radius: 3px;
    }
    .rec-name-input:focus { outline: none; }

    .rec-playbar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .rec-item.active .rec-playbar { display: flex; }
    .rec-playbtn {
      background: none; border: 1px solid #333; color: #aaa;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer; font-size: 0.7rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-playbtn:hover { border-color: #555; color: #fff; }
    .rec-seek {
      flex: 1;
      min-width: 0;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: #333;
      border-radius: 2px;
      cursor: pointer;
    }
    .rec-seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #4a9eff;
      cursor: pointer;
    }
    .rec-seek::-moz-range-thumb {
      width: 11px; height: 11px;
      border: none;
      border-radius: 50%;
      background: #4a9eff;
      cursor: pointer;
    }
    .rec-timestr { font-size: 0.7rem; color: #555; flex-shrink: 0; white-space: nowrap; }

    .rec-empty {
      padding: 24px 12px;
      color: #444;
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.6;
    }

    #controls {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 56px;
      padding: 14px 0;
      flex-shrink: 0;
      border-bottom: 1px solid #1c1c1c;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    #controls::-webkit-scrollbar { display: none; }

    .grp { display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .cluster { display: flex; align-items: flex-end; gap: 14px; flex-shrink: 0; }
    .field { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .field-row { display: flex; align-items: center; gap: 6px; }
    .vdiv { width: 1px; align-self: stretch; background: #1c1c1c; margin: 2px 2px; flex-shrink: 0; }
    .lbl {
      font-size: 0.66rem; color: #6a6a6a; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap;
    }

    select {
      background: #181818; color: #e6e6e6; border: 1px solid #2a2a2a;
      padding: 7px 9px; border-radius: 6px; font-size: 0.82rem; cursor: pointer;
    }
    select:hover { border-color: #444; }

    button.btn {
      background: #181818; color: #cfcfcf; border: 1px solid #2a2a2a;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-size: 0.82rem; font-weight: 600; white-space: nowrap;
    }
    button.btn:hover { border-color: #444; }
    button.btn.accent { background: #1565c0; border-color: #1565c0; color: #fff; }
    button.btn.accent:hover { background: #1976d2; }
    button.btn.on { background: #1565c0; border-color: #1565c0; color: #fff; }

    #bpm-input {
      width: 46px; background: #181818; color: #e6e6e6; border: 1px solid #2a2a2a;
      padding: 7px 6px; border-radius: 6px; font-size: 0.82rem; text-align: center;
    }

    .mini-keys { display: flex; gap: 4px; align-items: center; }
    .mini-gap { width: 12px; }
    .mini-key {
      min-width: 34px; height: 36px; border-radius: 6px;
      background: #181818; border: 1px solid #262626; color: #cfcfcf;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1px; line-height: 1;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; user-select: none;
      transition: background 0.06s, border-color 0.06s;
    }
    .mini-key .mk-key { font-size: 0.56rem; color: #5c5c5c; font-weight: 600; }
    .mini-key:hover { background: #202020; }
    .mini-key.active { background: #1565c0; border-color: #1565c0; color: #fff; }
    .mini-key.active .mk-key { color: rgba(255,255,255,0.7); }

    #canvas-wrap {
      flex: 1;
      min-height: 0;
    }

    #pitch-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <button id="panel-toggle" title="Toggle recordings">☰</button>
    <div id="sidebar">
      <div class="rec-header">
        <button id="rec-btn" class="rec-record-btn">Start</button>
        <div class="rec-status">
          <span id="rec-dot" style="display:none;color:#f44336;font-size:1.1rem;line-height:1;">●</span>
          <span id="rec-timer" style="display:none;font-size:0.82rem;color:#aaa;min-width:32px;"></span>
        </div>
      </div>
      <div class="sidebar-head">Recordings</div>
      <div id="rec-list">
        <p class="rec-empty">No recordings yet.<br>Hit Record to start.</p>
      </div>
    </div>

    <div id="main">
    <div id="controls">
      <div class="cluster">
        <div class="field">
          <span class="lbl">Raga</span>
          <select id="raga-select">
            <option value="mayamalavagowla">Mayamalavagowla</option>
            <option value="shankarabharanam">Shankarabharanam</option>
          </select>
        </div>
        <div class="field">
          <span class="lbl">Sa</span>
          <select id="sa-select">
            <option value="D3">D3</option>
            <option value="C#3">C#3</option>
            <option value="C3" selected>C3</option>
            <option value="B2">B2</option>
          </select>
        </div>
        <div class="vdiv"></div>
        <div class="field">
          <span class="lbl">Keys</span>
          <div class="mini-keys" id="mini-keys"></div>
        </div>
      </div>

      <div class="cluster">
        <div class="field">
          <span class="lbl">Visualizer</span>
          <button id="toggle-btn" class="btn accent">Start</button>
        </div>
        <div class="vdiv"></div>
        <div class="field">
          <span class="lbl">Beats</span>
          <div class="field-row">
            <input id="bpm-input" type="number" min="20" max="240" step="1" value="45">
            <button id="beat-btn" class="btn">Start</button>
          </div>
        </div>
        <div class="vdiv"></div>
        <div class="field">
          <span class="lbl">Tanpura</span>
          <button id="tanpura-btn" class="btn">Start</button>
        </div>
      </div>
    </div>

    <div id="canvas-wrap">
      <canvas id="pitch-canvas"></canvas>
    </div>
    </div><!-- /#main -->
  </div>

  <script>
  (function () {
    'use strict';

    const SWARA_NAMES = [
      'Sa', 'Ri\u2081', 'Ri\u2082', 'Ga\u2082', 'Ga\u2083',
      'Ma\u2081', 'Ma\u2082', 'Pa', 'Dha\u2081', 'Dha\u2082',
      'Ni\u2082', 'Ni\u2083',
    ];

    const RAGAS = {
      mayamalavagowla: {
        name: 'Mayamalavagowla',
        semitones: [0, 1, 4, 5, 7, 8, 11],
      },
      shankarabharanam: {
        name: 'Shankarabharanam',
        semitones: [0, 2, 4, 5, 7, 9, 11],
      },
    };

    const SA_FREQUENCIES = {
      'C3':  130.81,
      'C#3': 138.59,
      'D3':  146.83,
      'B2':  123.47,
    };

    // --- IndexedDB ---
    var db = null;

    function openDB() {
      return new Promise(function (resolve, reject) {
        var req = indexedDB.open('carnatic-practice', 1);
        req.onupgradeneeded = function (e) {
          var d = e.target.result;
          if (!d.objectStoreNames.contains('recordings')) {
            d.createObjectStore('recordings', { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = function (e) { resolve(e.target.result); };
        req.onerror   = function (e) { reject(e.target.error); };
      });
    }

    function dbSave(record) {
      // record: { name, createdAt, duration, raga, sa, audioBlob, pitchData }
      // Returns Promise<id>
      if (!db) return Promise.reject(new Error('DB not open'));
      return new Promise(function (resolve, reject) {
        var tx   = db.transaction('recordings', 'readwrite');
        var store = tx.objectStore('recordings');
        tx.onerror = tx.onabort = function (e) { reject(e.target.error || tx.error); };
        var req  = store.add(record);
        req.onsuccess = function (e) { resolve(e.target.result); };
        req.onerror   = function (e) { reject(e.target.error); };
      });
    }

    function dbGetAll() {
      // Returns Promise<Array> — all records including blobs
      if (!db) return Promise.reject(new Error('DB not open'));
      return new Promise(function (resolve, reject) {
        var tx   = db.transaction('recordings', 'readonly');
        var store = tx.objectStore('recordings');
        tx.onerror = tx.onabort = function (e) { reject(e.target.error || tx.error); };
        var req  = store.getAll();
        req.onsuccess = function (e) { resolve(e.target.result); };
        req.onerror   = function (e) { reject(e.target.error); };
      });
    }

    function dbDelete(id) {
      if (!db) return Promise.reject(new Error('DB not open'));
      return new Promise(function (resolve, reject) {
        var tx   = db.transaction('recordings', 'readwrite');
        var store = tx.objectStore('recordings');
        tx.onerror = tx.onabort = function (e) { reject(e.target.error || tx.error); };
        var req  = store.delete(id);
        req.onsuccess = function () { resolve(); };
        req.onerror   = function (e) { reject(e.target.error); };
      });
    }

    function dbPut(record) {
      // Overwrite an existing record (used for rename). Returns Promise.
      if (!db) return Promise.reject(new Error('DB not open'));
      return new Promise(function (resolve, reject) {
        var tx   = db.transaction('recordings', 'readwrite');
        var store = tx.objectStore('recordings');
        tx.onerror = tx.onabort = function (e) { reject(e.target.error || tx.error); };
        var req  = store.put(record);
        req.onsuccess = function () { resolve(); };
        req.onerror   = function (e) { reject(e.target.error); };
      });
    }

    var EMPTY_STATE_HTML = '<p class="rec-empty">No recordings yet.<br>Hit Record to start.</p>';

    function renderRecList(recs) {
      var listEl = document.getElementById('rec-list');
      if (!recs || recs.length === 0) {
        listEl.innerHTML = EMPTY_STATE_HTML;
        return;
      }
      // Sort newest-first
      var sorted = recs.slice().sort(function (a, b) { return b.createdAt - a.createdAt; });
      listEl.innerHTML = '';
      sorted.forEach(function (rec) { listEl.appendChild(makeRecEl(rec)); });
    }

    function makeRecEl(rec) {
      var el = document.createElement('div');
      el.className = 'rec-item';
      el.dataset.id = rec.id;
      el.innerHTML =
        '<div class="rec-name-row">' +
          '<span class="rec-name"></span>' +
          '<button class="rec-rename" title="Rename">✎</button>' +
        '</div>' +
        '<div class="rec-meta-row">' +
          '<span class="rec-duration">' + formatDuration(rec.duration) + '</span>' +
          '<span class="rec-actions">' +
            '<button class="rec-download" title="Download">⤓</button>' +
            '<button class="rec-delete" title="Delete">⌫</button>' +
          '</span>' +
        '</div>' +
        '<div class="rec-playbar">' +
          '<button class="rec-playbtn" data-state="stopped">▶</button>' +
          '<input type="range" class="rec-seek" min="0" max="' + rec.duration + '" step="0.01" value="0">' +
          '<span class="rec-timestr">0:00 / ' + formatDuration(rec.duration) + '</span>' +
        '</div>';
      el.querySelector('.rec-name').textContent = rec.name;

      el.querySelector('.rec-rename').addEventListener('click', function (e) {
        e.stopPropagation();
        startRename(el, rec);
      });
      el.querySelector('.rec-download').addEventListener('click', function (e) {
        e.stopPropagation();
        downloadRec(rec);
      });
      el.querySelector('.rec-delete').addEventListener('click', function (e) {
        e.stopPropagation();
        deleteRec(rec.id, el);
      });
      el.querySelector('.rec-playbtn').addEventListener('click', function (e) {
        e.stopPropagation();
        togglePlayback(rec, el);
      });
      var seekEl = el.querySelector('.rec-seek');
      seekEl.addEventListener('click',     function (e) { e.stopPropagation(); });
      seekEl.addEventListener('pointerdown', function () { seekEl._seeking = true; });
      seekEl.addEventListener('pointerup',   function () { seekEl._seeking = false; });
      seekEl.addEventListener('input', function (e) {
        e.stopPropagation();
        if (state.playbackEl === el && state.playbackAudio) {
          state.playbackAudio.currentTime = parseFloat(seekEl.value) || 0;
          if (state.playbackAudio.paused) renderCanvas();   // refresh frozen frame while paused
        }
      });
      el.addEventListener('click', function () {
        togglePlayback(rec, el);
      });
      return el;
    }

    function downloadRec(rec) {
      if (!rec.audioBlob) return;
      var ext = '.webm';
      var t = rec.audioBlob.type || '';
      if (t.indexOf('ogg') >= 0)      ext = '.ogg';
      else if (t.indexOf('mp4') >= 0 || t.indexOf('m4a') >= 0) ext = '.m4a';
      else if (t.indexOf('wav') >= 0) ext = '.wav';
      var safe = (rec.name || 'recording').replace(/[\\/:*?"<>|]/g, '-');
      var url  = URL.createObjectURL(rec.audioBlob);
      var a    = document.createElement('a');
      a.href = url;
      a.download = safe + ext;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }

    function startRename(el, rec) {
      var nameEl = el.querySelector('.rec-name');
      if (el.querySelector('.rec-name-input')) return;   // already editing
      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'rec-name-input';
      input.value = rec.name;
      nameEl.style.display = 'none';
      nameEl.parentNode.insertBefore(input, nameEl);
      input.focus();
      input.select();

      var settled = false;
      function finish(save) {
        if (settled) return;
        settled = true;
        var v = input.value.trim();
        input.remove();
        nameEl.style.display = '';
        if (save && v && v !== rec.name) {
          rec.name = v;
          nameEl.textContent = v;
          dbPut(rec).catch(function (err) { console.warn('Rename failed:', err); });
        }
      }
      input.addEventListener('click', function (e) { e.stopPropagation(); });
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter')      { e.preventDefault(); finish(true); }
        else if (e.key === 'Escape') { finish(false); }
      });
      input.addEventListener('blur', function () { finish(true); });
    }

    function deleteRec(id, el) {
      if (el === state.playbackEl) stopPlayback();
      dbDelete(id).then(function () {
        el.remove();
        var listEl = document.getElementById('rec-list');
        if (!listEl.querySelector('.rec-item')) {
          listEl.innerHTML = EMPTY_STATE_HTML;
        }
      }).catch(function (err) {
        console.warn('Delete failed:', err);
      });
    }

    function prependRecItem(rec) {
      var listEl = document.getElementById('rec-list');
      var empty  = listEl.querySelector('.rec-empty');
      if (empty) empty.remove();
      listEl.insertBefore(makeRecEl(rec), listEl.firstChild);
    }

    function togglePlayback(rec, el) {
      if (state.playbackEl === el && state.playbackMode) {
        // Pause/resume
        var audio = state.playbackAudio;
        var btn   = el.querySelector('.rec-playbtn');
        if (audio.paused) {
          audio.play();
          btn.textContent = '⏸';
          btn.dataset.state = 'playing';
        } else {
          audio.pause();
          btn.textContent = '▶';
          btn.dataset.state = 'paused';
        }
      } else {
        startPlayback(rec, el);
      }
    }

    const LIVE_WINDOW_SECS = 10;

    var recState = {
      isRecording:   false,
      starting:      false,
      mediaRecorder: null,
      chunks:        [],
      startTime:     0,
      points:        [],        // pitch points timestamped from recording start
      timerInterval: null,
    };

    const state = {
      isLive: false,
      audioCtx: null,
      processor: null,
      stream: null,
      pitchPoints: [],
      currentSwara: -1,
      startTime: 0,
      animFrame: null,
      raga: null,
      saFreq: null,
      playbackMode:   false,
      playbackPoints: [],
      playbackRaga:   null,
      playbackSa:     null,
      playbackAudio:  null,
      playbackEl:     null,   // the currently-active sidebar item element
    };

    const toggleBtn  = document.getElementById('toggle-btn');
    const ragaSelect = document.getElementById('raga-select');
    const saSelect   = document.getElementById('sa-select');
    const canvas     = document.getElementById('pitch-canvas');

    function yinDetect(buffer, sampleRate) {
      var THRESHOLD = 0.15;
      var halfSize  = Math.floor(buffer.length / 2);
      var minTau    = Math.floor(sampleRate / 1000);
      var maxTau    = Math.min(Math.floor(sampleRate / 80), halfSize);

      var diff = new Float32Array(halfSize);
      for (var tau = 0; tau < halfSize; tau++) {
        var sum = 0;
        for (var i = 0; i < halfSize; i++) {
          var d = buffer[i] - buffer[i + tau];
          sum += d * d;
        }
        diff[tau] = sum;
      }

      diff[0] = 1;
      var runningSum = 0;
      for (var tau = 1; tau < halfSize; tau++) {
        runningSum += diff[tau];
        diff[tau] = runningSum === 0 ? 1 : (diff[tau] * tau) / runningSum;
      }

      var tau = minTau;
      while (tau < maxTau) {
        if (diff[tau] < THRESHOLD) {
          while (tau + 1 < maxTau && diff[tau + 1] < diff[tau]) tau++;
          break;
        }
        tau++;
      }

      if (tau >= maxTau) return { frequency: 0, confidence: 0 };

      var betterTau = tau;
      if (tau > 0 && tau < halfSize - 1) {
        var s0 = diff[tau - 1], s1 = diff[tau], s2 = diff[tau + 1];
        var denom = 2 * (s0 - 2 * s1 + s2);
        if (denom !== 0) betterTau = tau + (s0 - s2) / denom;
      }

      // Octave-error correction: YIN tends to lock onto a harmonic (octave up).
      // Iteratively check if 2× the current tau is also a valid dip — keep going
      // down in frequency until no more valid lower-octave dips are found.
      // Threshold 2.0× is lenient enough to catch the true fundamental even when
      // its CMNDF dip is slightly weaker than the harmonic's (which is why YIN
      // picked the harmonic in the first place).
      return { frequency: sampleRate / betterTau, confidence: 1 - diff[tau] };
    }

    function freqToSemitone(freq, saFreq) {
      return 12 * Math.log2(freq / saFreq);
    }

    function semitoneToSwaraIndex(semitone) {
      var idx = Math.round(semitone) % 12;
      if (idx < 0) idx += 12;
      return idx;
    }

    function getRagaRange(raga) {
      var niSemi = raga.semitones[raga.semitones.length - 1];
      var riSemi = raga.semitones[1];
      return { minSemi: niSemi - 12, maxSemi: riSemi + 12 };
    }

    async function startLive() {
      var stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: false,   // keep voice harmonics intact
            autoGainControl: true,
          }
        });
      } catch (err) {
        alert('Microphone access denied.');
        return;
      }

      state.raga   = RAGAS[ragaSelect.value];
      state.saFreq = SA_FREQUENCIES[saSelect.value];
      state.pitchPoints  = [];
      state.currentSwara = -1;
      state.startTime    = Date.now();
      state.stream       = stream;

      var actx = new (window.AudioContext || window.webkitAudioContext)();
      state.audioCtx = actx;

      var source    = actx.createMediaStreamSource(stream);
      var processor = actx.createScriptProcessor(4096, 1, 1);
      state.processor = processor;

      processor.onaudioprocess = function (e) {
        var input = e.inputBuffer.getChannelData(0);
        // No windowing — Hann window distorts YIN's CMNDF at large tau values,
        // biasing the algorithm toward smaller tau (octave-up errors).
        var result  = yinDetect(input, actx.sampleRate);
        var elapsed = (Date.now() - state.startTime) / 1000;

        if (result.frequency > 0 && result.confidence > 0.6) {
          state.pitchPoints.push({ time: elapsed, frequency: result.frequency, confidence: result.confidence });
          if (recState.isRecording) {
            recState.points.push({
              time:       (Date.now() - recState.startTime) / 1000,
              frequency:  result.frequency,
              confidence: result.confidence,
            });
          }
          state.currentSwara = semitoneToSwaraIndex(freqToSemitone(result.frequency, state.saFreq));
        } else {
          state.currentSwara = -1;
        }

        var cutoff = elapsed - LIVE_WINDOW_SECS;
        while (state.pitchPoints.length > 0 && state.pitchPoints[0].time < cutoff) {
          state.pitchPoints.shift();
        }
      };

      source.connect(processor);
      processor.connect(actx.destination);

      if (state.playbackMode) stopPlayback();
      state.isLive = true;
      toggleBtn.textContent = 'Stop';

      function animate() {
        renderCanvas();
        state.animFrame = requestAnimationFrame(animate);
      }
      state.animFrame = requestAnimationFrame(animate);
    }

    function stopLive() {
      if (recState.isRecording) stopRecording();
      if (state.animFrame)  { cancelAnimationFrame(state.animFrame); state.animFrame = null; }
      if (state.processor)  { state.processor.disconnect(); state.processor = null; }
      if (state.audioCtx)   { state.audioCtx.close(); state.audioCtx = null; }
      if (state.stream)     { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }

      state.isLive = false;
      state.pitchPoints  = [];
      state.currentSwara = -1;
      toggleBtn.textContent = 'Start';

      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0c0c0c';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function startPlayback(rec, el) {
      if (recState.isRecording) return;
      // Stop live detection while playing back — full teardown so the mic
      // stream/AudioContext/processor aren't orphaned when the visualizer is
      // restarted later (getUserMedia permission persists, so no re-prompt).
      if (state.isLive) stopLive();
      // Stop any existing playback
      if (state.playbackMode) stopPlayback();

      // Set up audio
      var audio = new Audio();
      audio.src = URL.createObjectURL(rec.audioBlob);
      audio.play().catch(function (e) { console.warn('Audio play failed:', e); });

      state.playbackMode   = true;
      state.playbackPoints = rec.pitchData;
      state.playbackRaga   = rec.raga;
      state.playbackSa     = rec.sa;
      state.playbackAudio  = audio;
      state.playbackEl     = el;

      el.classList.add('active');
      var playBtn = el.querySelector('.rec-playbtn');
      playBtn.dataset.state = 'playing';
      playBtn.textContent   = '⏸';

      // Update time display + seek position while playing
      var timeStr = el.querySelector('.rec-timestr');
      var seekEl  = el.querySelector('.rec-seek');
      var totalStr = formatDuration(rec.duration);
      seekEl.value = 0;
      var tickId = setInterval(function () {
        if (!state.playbackMode) { clearInterval(tickId); return; }
        timeStr.textContent = formatDuration(audio.currentTime) + ' / ' + totalStr;
        if (!seekEl._seeking) seekEl.value = audio.currentTime;
      }, 250);

      audio.addEventListener('ended', function () {
        clearInterval(tickId);
        stopPlayback();
      });

      // Start canvas animation loop
      function pbAnimate() {
        if (!state.playbackMode) return;
        if (!state.playbackAudio || !state.playbackAudio.paused) renderCanvas();
        state.animFrame = requestAnimationFrame(pbAnimate);
      }
      state.animFrame = requestAnimationFrame(pbAnimate);
    }

    function stopPlayback() {
      if (!state.playbackMode) return;
      if (state.animFrame) { cancelAnimationFrame(state.animFrame); state.animFrame = null; }

      if (state.playbackAudio) {
        URL.revokeObjectURL(state.playbackAudio.src);
        state.playbackAudio.pause();
        state.playbackAudio = null;
      }
      if (state.playbackEl) {
        state.playbackEl.classList.remove('active');
        var pb = state.playbackEl.querySelector('.rec-playbtn');
        if (pb) { pb.dataset.state = 'stopped'; pb.textContent = '▶'; }
        state.playbackEl = null;
      }

      state.playbackMode   = false;
      state.playbackPoints = [];
      state.playbackRaga   = null;
      state.playbackSa     = null;

      // Clear canvas
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width  = rect.width  * dpr;
      canvas.height = rect.height * dpr;
      ctx.fillStyle = '#0c0c0c';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    var recDotEl   = document.getElementById('rec-dot');
    var recTimerEl = document.getElementById('rec-timer');
    var recBtn     = document.getElementById('rec-btn');

    async function startRecording() {
      if (recState.isRecording || recState.starting) return;
      recState.starting = true;
      try {
        if (!state.isLive) await startLive();
        if (!state.stream) return;          // mic denied
        recState.chunks  = [];
        recState.points  = [];
        recState.startTime = Date.now();

        try {
          var mimeType = ['audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']
            .find(function (t) { return MediaRecorder.isTypeSupported(t); }) || '';
          recState.mediaRecorder = new MediaRecorder(
            state.stream,
            mimeType ? { mimeType: mimeType } : {}
          );
          recState.mediaRecorder.ondataavailable = function (e) {
            if (e.data.size > 0) recState.chunks.push(e.data);
          };
          recState.mediaRecorder.onstop = function () {
            var blob = new Blob(recState.chunks, { type: recState.mediaRecorder.mimeType });
            var dur  = (Date.now() - recState.startTime) / 1000;
            var rec  = {
              name:      formatRecName(),
              createdAt: Date.now(),
              duration:  dur,
              raga:      ragaSelect.value,
              sa:        saSelect.value,
              audioBlob: blob,
              pitchData: recState.points.slice(),
            };
            dbSave(rec).then(function (id) {
              rec.id = id;
              prependRecItem(rec);
            }).catch(function (err) {
              console.warn('Failed to save recording:', err);
            });
          };
          recState.mediaRecorder.start();
          recState.isRecording = true;

          recDotEl.style.display   = 'inline';
          recTimerEl.style.display = 'inline';
          recBtn.textContent       = 'Stop';
          recBtn.classList.add('on');

          recState.timerInterval = setInterval(function () {
            recTimerEl.textContent = formatDuration((Date.now() - recState.startTime) / 1000);
          }, 500);
        } catch (err) {
          console.warn('Failed to start recording:', err);
          recState.mediaRecorder = null;
          alert('Recording is not supported in this browser.');
        }
      } finally {
        recState.starting = false;
      }
    }

    function stopRecording() {
      if (!recState.isRecording) return;
      recState.isRecording = false;
      clearInterval(recState.timerInterval);
      recState.mediaRecorder.stop();

      recDotEl.style.display   = 'none';
      recTimerEl.style.display = 'none';
      recTimerEl.textContent   = '';
      recBtn.textContent       = 'Start';
      recBtn.classList.remove('on');
    }

    recBtn.addEventListener('click', function () {
      if (recState.isRecording) stopRecording(); else startRecording();
    });

    function formatDuration(s) {
      var m = Math.floor(s / 60);
      return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    function formatRecName() {
      var d    = new Date();
      var mon  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
      var hh   = String(d.getHours()).padStart(2, '0');
      var mm   = String(d.getMinutes()).padStart(2, '0');
      return mon + ' ' + d.getDate() + ' ' + hh + ':' + mm;
    }

    function renderCanvas() {
      var raga   = state.playbackMode ? RAGAS[state.playbackRaga]   : state.raga;
      var saFreq = state.playbackMode ? SA_FREQUENCIES[state.playbackSa] : state.saFreq;
      if (!raga || !saFreq) return;

      var dpr   = window.devicePixelRatio || 1;
      var rect  = canvas.parentElement.getBoundingClientRect();
      var width = rect.width, height = rect.height;

      canvas.width        = width * dpr;
      canvas.height       = height * dpr;
      canvas.style.width  = width + 'px';
      canvas.style.height = height + 'px';

      var ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      var pL = 52, pR = 16, pT = 16, pB = 28;
      var plotW = width - pL - pR;
      var plotH = height - pT - pB;

      ctx.fillStyle = '#0c0c0c';
      ctx.fillRect(0, 0, width, height);

      var range     = getRagaRange(raga);
      var minSemi   = range.minSemi;
      var maxSemi   = range.maxSemi;
      var semiRange = maxSemi - minSemi;

      var elapsed = state.playbackMode
        ? (state.playbackAudio ? state.playbackAudio.currentTime : 0)
        : (Date.now() - state.startTime) / 1000;
      var windowEnd      = elapsed;
      var windowStart    = Math.max(0, windowEnd - LIVE_WINDOW_SECS);
      var windowDuration = Math.max(windowEnd - windowStart, 1);

      for (var semi = minSemi; semi <= maxSemi; semi++) {
        var pos = ((semi % 12) + 12) % 12;
        if (raga.semitones.indexOf(pos) === -1) continue;

        var y = pT + plotH - ((semi - minSemi) / semiRange) * plotH;

        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pL, y);
        ctx.lineTo(width - pR, y);
        ctx.stroke();

        var octave = Math.floor(semi / 12);
        var label  = SWARA_NAMES[pos] +
          (octave > 0 ? "'".repeat(octave) : octave < 0 ? '.'.repeat(-octave) : '');
        ctx.fillStyle    = '#999';
        ctx.font         = '10px monospace';
        ctx.textAlign    = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, pL - 6, y);
      }

      var timeStep  = windowDuration <= 5 ? 1 : 2;
      var firstMark = Math.ceil(windowStart / timeStep) * timeStep;
      ctx.font         = '10px monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'top';

      for (var t = firstMark; t <= windowEnd; t += timeStep) {
        var x = pL + ((t - windowStart) / windowDuration) * plotW;
        ctx.strokeStyle = '#161616';
        ctx.lineWidth   = 0.5;
        ctx.beginPath();
        ctx.moveTo(x, pT);
        ctx.lineTo(x, pT + plotH);
        ctx.stroke();
        ctx.fillStyle = '#444';
        ctx.fillText(formatDuration(t), x, height - pB + 8);
      }

      var pts = state.playbackMode ? state.playbackPoints : state.pitchPoints;
      for (var p = 0; p < pts.length; p++) {
        var point    = pts[p];
        var semitone = freqToSemitone(point.frequency, saFreq);

        if (semitone < minSemi || semitone > maxSemi) continue;
        if (point.time < windowStart || point.time > windowEnd) continue;

        var swaraIdx = semitoneToSwaraIndex(semitone);
        var inRaga   = raga.semitones.indexOf(swaraIdx) !== -1;

        var px = pL + ((point.time - windowStart) / windowDuration) * plotW;
        var py = pT + plotH - ((semitone - minSemi) / semiRange) * plotH;

        var alpha = 0.4 + point.confidence * 0.6;
        ctx.fillStyle = inRaga
          ? 'rgba(76, 175, 80, ' + alpha + ')'
          : 'rgba(244, 67, 54, ' + alpha + ')';

        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.textAlign    = 'right';
      ctx.textBaseline = 'top';
      if (state.currentSwara >= 0) {
        ctx.fillStyle = '#fff';
        ctx.font      = 'bold 14px monospace';
        ctx.fillText(SWARA_NAMES[state.currentSwara], width - pR, pT + 6);
      } else {
        ctx.fillStyle = '#555';
        ctx.font      = 'bold 14px monospace';
        ctx.fillText('\u2014', width - pR, pT + 6);
      }

      ctx.fillStyle = '#555';
      ctx.font      = '10px sans-serif';
      ctx.textAlign = 'left';
      var saLabel = state.playbackMode ? state.playbackSa : saSelect.value;
      ctx.fillText(raga.name + '  |  Sa = ' + saLabel, pL + 8, pT + 6);

      var lX = pL + 8, lY = pT + plotH - 10;
      ctx.font         = '10px sans-serif';
      ctx.textAlign    = 'left';
      ctx.textBaseline = 'middle';

      ctx.fillStyle = '#4caf50';
      ctx.beginPath(); ctx.arc(lX, lY, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#666';
      ctx.fillText('In-raga', lX + 10, lY);

      ctx.fillStyle = '#f44336';
      ctx.beginPath(); ctx.arc(lX + 70, lY, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#666';
      ctx.fillText('Out-of-raga', lX + 80, lY);
    }

    toggleBtn.addEventListener('click', function () {
      if (state.isLive) stopLive(); else startLive();
    });

    window.addEventListener('resize', function () {
      if (state.isLive) renderCanvas();
    });

    // --- Reference svara pads (independent harmonium playback) ---
    var PAD_SVARA_NAMES = ['Sa', 'Ri', 'Ga', 'Ma', 'Pa', 'Da', 'Ni', 'Sȧ'];
    var PAD_KEY_MAP = ['a', 's', 'd', 'f', 'j', 'k', 'l', ';'];
    var HARMONICS = [
      { amp: 1.0,  mult: 1.0   },
      { amp: 0.55, mult: 2.0   },
      { amp: 0.40, mult: 3.0   },
      { amp: 0.25, mult: 4.0   },
      { amp: 0.18, mult: 5.0   },
      { amp: 0.12, mult: 6.0   },
      { amp: 0.30, mult: 1.003 },
      { amp: 0.20, mult: 2.006 },
    ];

    var miniKeysEl = document.getElementById('mini-keys');
    var playCtx = null;
    var voices = {};

    function playAudioCtx() {
      if (!playCtx) playCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (playCtx.state === 'suspended') playCtx.resume();
      return playCtx;
    }

    function startVoice(id, hz) {
      if (voices[id]) return;
      var ac = playAudioCtx();
      var now = ac.currentTime;
      var gain = ac.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(1.8, now + 0.04);
      gain.connect(ac.destination);
      var oscs = HARMONICS.map(function (h) {
        var osc = ac.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(hz * h.mult, now);
        var hg = ac.createGain();
        hg.gain.value = h.amp / HARMONICS.length;
        osc.connect(hg).connect(gain);
        osc.start(now);
        return osc;
      });
      voices[id] = { oscs: oscs, gain: gain };
    }

    function stopVoice(id) {
      var v = voices[id];
      if (!v) return;
      var ac = playAudioCtx();
      var now = ac.currentTime;
      v.gain.gain.cancelScheduledValues(now);
      v.gain.gain.setValueAtTime(v.gain.gain.value, now);
      v.gain.gain.linearRampToValueAtTime(0, now + 0.12);
      v.oscs.forEach(function (o) { o.stop(now + 0.14); });
      delete voices[id];
    }

    var padByKey = {};   // keyboard char -> { el, hz, id }

    function buildPads() {
      miniKeysEl.innerHTML = '';
      padByKey = {};
      var raga   = RAGAS[ragaSelect.value];
      var saFreq = SA_FREQUENCIES[saSelect.value];
      var semis  = raga.semitones.concat([12]); // 7 svaras + upper Sa
      semis.forEach(function (semi, i) {
        if (i === 4) {
          var g = document.createElement('div');
          g.className = 'mini-gap';
          miniKeysEl.appendChild(g);
        }
        var hz = saFreq * Math.pow(2, semi / 12);
        var key = PAD_KEY_MAP[i];
        var id = 'pad' + i;
        var el = document.createElement('div');
        el.className = 'mini-key';
        el.innerHTML =
          '<span class="mk-svara">' + PAD_SVARA_NAMES[i] + '</span>' +
          '<span class="mk-key">' + (key === ';' ? ';' : key.toUpperCase()) + '</span>';
        var press = function (e) { e.preventDefault(); startVoice(id, hz); el.classList.add('active'); };
        var release = function () { stopVoice(id); el.classList.remove('active'); };
        el.addEventListener('pointerdown', press);
        el.addEventListener('pointerup', release);
        el.addEventListener('pointerleave', release);
        el.addEventListener('pointercancel', release);
        miniKeysEl.appendChild(el);
        padByKey[key] = { el: el, hz: hz, id: id };
      });
    }

    function isTypingTarget(e) {
      var t = e.target;
      return !!t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    }

    window.addEventListener('keydown', function (e) {
      if (isTypingTarget(e)) return;     // don't trigger notes while typing (e.g. renaming)
      var pad = padByKey[e.key.toLowerCase()];
      if (!pad || e.repeat) return;
      startVoice(pad.id, pad.hz);
      pad.el.classList.add('active');
    });
    window.addEventListener('keyup', function (e) {
      if (isTypingTarget(e)) return;
      var pad = padByKey[e.key.toLowerCase()];
      if (!pad) return;
      stopVoice(pad.id);
      pad.el.classList.remove('active');
    });

    // --- Metronome ---
    var beatBtn  = document.getElementById('beat-btn');
    var bpmInput = document.getElementById('bpm-input');
    var beatTimer = null;

    function tick() {
      var ac = playAudioCtx();
      var now = ac.currentTime;
      var osc = ac.createOscillator();
      var g = ac.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(420, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.04);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(0.6, now + 0.003);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
      osc.connect(g).connect(ac.destination);
      osc.start(now);
      osc.stop(now + 0.1);
    }

    function startBeat() {
      var bpm = Math.min(240, Math.max(20, parseInt(bpmInput.value, 10) || 45));
      var interval = 60000 / bpm;
      tick();
      beatTimer = setInterval(tick, interval);
      beatBtn.classList.add('on');
      beatBtn.textContent = 'Stop';
    }

    function stopBeat() {
      if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
      beatBtn.classList.remove('on');
      beatBtn.textContent = 'Start';
    }

    beatBtn.addEventListener('click', function () {
      if (beatTimer) stopBeat(); else startBeat();
    });
    bpmInput.addEventListener('change', function () {
      if (beatTimer) { stopBeat(); startBeat(); }
    });

    // --- Tanpura drone (looping pluck cycle: lower Pa, Sa, Sa, lower Sa) ---
    var tanpuraBtn = document.getElementById('tanpura-btn');
    var TANPURA_SEMIS = [-5, 0, 0, -12];     // Pa(lower) Sa Sa Sa(lower)
    var PLUCK_GAP = 1.25;                      // seconds between strings
    var tanpuraTimer = null;
    var tanpuraStep = 0;

    function pluck(hz) {
      var ac = playAudioCtx();
      var now = ac.currentTime;

      // jivari: bright on attack, mellows as it decays
      var lp = ac.createBiquadFilter();
      lp.type = 'lowpass';
      lp.Q.value = 0.6;
      lp.frequency.setValueAtTime(3400, now);
      lp.frequency.exponentialRampToValueAtTime(650, now + 3.2);

      var gain = ac.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.34, now + 0.09);   // soft attack
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.8); // long bloom
      lp.connect(gain).connect(ac.destination);

      // soft sine partials + a few slightly detuned twins for the shimmer
      var parts = [
        { mult: 1.0,  amp: 1.0  },
        { mult: 2.0,  amp: 0.7  },
        { mult: 3.0,  amp: 0.5  },
        { mult: 4.0,  amp: 0.34 },
        { mult: 5.0,  amp: 0.22 },
        { mult: 6.0,  amp: 0.15 },
        { mult: 8.0,  amp: 0.09 },
        { mult: 2.01, amp: 0.4  },
        { mult: 3.02, amp: 0.26 },
      ];
      var norm = parts.reduce(function (s, p) { return s + p.amp; }, 0);
      parts.forEach(function (p) {
        var osc = ac.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(hz * p.mult, now);
        var hg = ac.createGain();
        hg.gain.value = p.amp / norm;
        osc.connect(hg).connect(lp);
        osc.start(now);
        osc.stop(now + 4.0);
      });
    }

    function startTanpura() {
      tanpuraStep = 0;
      var fire = function () {
        var saFreq = SA_FREQUENCIES[saSelect.value];
        var semi = TANPURA_SEMIS[tanpuraStep % TANPURA_SEMIS.length];
        pluck(saFreq * Math.pow(2, semi / 12));
        tanpuraStep++;
      };
      fire();
      tanpuraTimer = setInterval(fire, PLUCK_GAP * 1000);
      tanpuraBtn.classList.add('on');
      tanpuraBtn.textContent = 'Stop';
    }

    function stopTanpura() {
      if (tanpuraTimer) { clearInterval(tanpuraTimer); tanpuraTimer = null; }
      tanpuraBtn.classList.remove('on');
      tanpuraBtn.textContent = 'Start';
    }

    tanpuraBtn.addEventListener('click', function () {
      if (tanpuraTimer) stopTanpura(); else startTanpura();
    });

    ragaSelect.addEventListener('change', function () {
      if (state.isLive) state.raga = RAGAS[ragaSelect.value];
      buildPads();
    });
    saSelect.addEventListener('change', function () {
      if (state.isLive) state.saFreq = SA_FREQUENCIES[saSelect.value];
      buildPads();
    });
    buildPads();

    // --- Panel toggle ---
    document.getElementById('panel-toggle').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('collapsed');
    });

    // --- Init: open IndexedDB ---
    openDB().then(function (d) {
      db = d;
      return dbGetAll();
    }).then(function (recs) {
      renderRecList(recs);
    }).catch(function (err) {
      console.warn('IndexedDB unavailable:', err);
    });
  })();
  </script>
</body>
</html>
